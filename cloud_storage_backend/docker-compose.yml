version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cloud_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    command: sh -c "python wait_for_db.py && python manage.py init_db && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - ../cloud_frontend/build:/app/frontend_build
    ports:
      - "8000:8000"
    depends_on:
      - db